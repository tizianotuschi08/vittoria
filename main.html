<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sei arrabbiata?</title>
    <!-- Importazione di un font giocoso e moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Reset di base e impostazioni di visualizzazione */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background-color: #ffb3c6; /* Rosa come l'immagine */
            display: flex;
            flex-direction: column;
        }

        /* Barra superiore bianca simile all'interfaccia dell'immagine */
        .top-bar {
            width: 100%;
            height: 40px;
            background-color: #ffffff;
            border-bottom: 4px solid #000000;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
        }

        /* Piccoli cerchi decorativi in stile finestra per la barra superiore */
        .window-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #000;
            border-radius: 50%;
        }
        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }

        /* Contenitore principale */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Il box/finestra centrale basato sul disegno dell'immagine */
        .modal-card {
            background-color: #800015; /* Rosso scuro/bordeaux */
            border: 5px solid #000000;
            border-radius: 35px;
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.15);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 240px;
            z-index: 10;
        }

        /* Testo della domanda */
        .question-text {
            color: #ffffff;
            font-size: 24px;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000;
        }

        /* Area dei pulsanti */
        .buttons-wrapper {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            gap: 20px;
            position: relative;
            min-height: 60px;
        }

        /* Stile comune dei pulsanti */
        .btn {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 12px 30px;
            border: 4px solid #000000;
            border-radius: 15px;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 4px 4px 0px #000000;
            min-width: 100px;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        /* Pulsante SÌ (Verde brillante) */
        .btn-yes {
            background-color: #adff2f; /* Verde lime dell'immagine */
            color: #000000;
        }

        /* Pulsante NO (Rosso acceso) */
        .btn-no {
            background-color: #ff3333; /* Rosso dell'immagine */
            color: #ffffff;
            /* La transizione della posizione deve essere immediata per evitare cheat visivi */
            transition: none; 
            z-index: 100;
        }

        /* POPUP DI SUCCESSO (EVVIVAAA!) */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 182, 193, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .success-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-box {
            background-color: #ffffff;
            border: 6px solid #000000;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 10px 10px 0px #000000;
            transform: scale(0.7);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            width: 350px;
        }

        .success-overlay.show .success-box {
            transform: scale(1);
        }

        .success-title {
            font-family: 'Fredoka One', cursive;
            font-size: 38px;
            color: #800015;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #ffb3c6;
            animation: bounce 0.8s infinite alternate;
        }

        .success-message {
            font-size: 18px;
            color: #333333;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn-restart {
            background-color: #adff2f;
            color: #000;
            font-size: 18px;
            padding: 10px 25px;
            border: 4px solid #000;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #000;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
        }

        /* Animazione di rimbalzo per il testo */
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        /* Canvas per i coriandoli sullo sfondo */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 998;
        }
    </style>
</head>
<body>

    <!-- Barra superiore ispirata all'immagine -->
    <div class="top-bar">
        <div class="window-dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
    </div>

    <!-- Contenitore principale -->
    <div class="container">
        <div class="modal-card">
            <h1 class="question-text">Sei Arrabbiata?</h1>
            
            <div class="buttons-wrapper" id="buttonsArea">
                <button class="btn btn-yes" id="yesBtn">Sì</button>
                <button class="btn btn-no" id="noBtn">No</button>
            </div>
        </div>
    </div>

    <!-- Schermata di Vittoria / Successo -->
    <div class="success-overlay" id="successOverlay">
        <canvas id="confetti-canvas"></canvas>
        <div class="success-box">
            <h2 class="success-title">EVVIVAAA!</h2>
            <p class="success-message">Sapevo che non avresti resistito a fare la pace! ❤️</p>
            <button class="btn-restart" id="restartBtn">Ricomincia</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const successOverlay = document.getElementById('successOverlay');
        const restartBtn = document.getElementById('restartBtn');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        let confetti = [];
        let animationFrameId;

        // Funzione per muovere il pulsante "NO" in una posizione casuale
        function moveNoButton() {
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // Definiamo i margini di sicurezza dello schermo per evitare che vada fuori
            const padding = 25;
            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            // Genera coordinate casuali sull'intero schermo
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding + 40, Math.floor(Math.random() * maxY)); // Evita la barra superiore

            // Cambiamo la posizione in fixed per permettergli di muoversi ovunque nello schermo
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Eventi per muovere il pulsante al tocco o al passaggio del mouse
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Previene il click sui dispositivi touch
            moveNoButton();
        });

        // Evento click sul tasto "SÌ"
        yesBtn.addEventListener('click', function() {
            successOverlay.classList.add('show');
            initConfetti();
            animateConfetti();
        });

        // Reset del gioco
        restartBtn.addEventListener('click', function() {
            successOverlay.classList.remove('show');
            cancelAnimationFrame(animationFrameId);
            confetti = [];
            
            // Ripristina il tasto "NO" alla sua posizione originale all'interno del box
            noBtn.style.position = 'static';
            noBtn.style.left = 'auto';
            noBtn.style.top = 'auto';
        });

        // Ridimensionamento del canvas per i coriandoli
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Classe per la gestione dei singoli coriandoli
        class Confetto {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 8 + 6;
                this.color = ['#ff3333', '#adff2f', '#ffb3c6', '#ffffff', '#ffd700'][Math.floor(Math.random() * 5)];
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 4 + 4;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;

                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function initConfetti() {
            confetti = [];
            for (let i = 0; i < 150; i++) {
                confetti.push(new Confetto());
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confetti.forEach(c => {
                c.update();
                c.draw();
            });
            animationFrameId = requestAnimationFrame(animateConfetti);
        }
    </script>
</body>
</html>
